<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gattaiMerge Benchmark vs Libraries</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      background: #0f1115;
      color: #e6e6e6;
    }
    h1 { margin: 0 0 16px; }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      background: #374151;
      cursor: not-allowed;
    }
    select {
      padding: 6px 10px;
      background: #1f2937;
      color: #e6e6e6;
      border: 1px solid #374151;
      border-radius: 6px;
    }
    table {
      margin-top: 16px;
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #374151;
      padding: 8px 12px;
      text-align: right;
    }
    th { background: #1f2937; text-align: left; }
    td:first-child, th:first-child { text-align: left; }
    .lib-your { color: #60a5fa; font-weight: 600; }
    .lib-lodash { color: #f59e0b; }
    .lib-deepmerge { color: #10b981; }
   .log {
      margin-top: 16px;
      padding: 12px;
      background: #111827;
      border-radius: 6px;
      font-family: ui-monospace, monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "lodash": "https://cdn.jsdelivr.net/npm/lodash@4.17.21/+esm",
        "deepmerge-ts": "https://cdn.jsdelivr.net/npm/deepmerge-ts@7.1.3/+esm"
      }
    }
  </script>
</head>
<body>
  <h1>gattaiMerge Benchmark</h1>
  <div class="controls">
    <button id="run">ベンチマーク実行</button>
    <select id="caseFilter">
      <option value="all">全ケース</option>
      <option value="Small PlainObject">Small PlainObject</option>
      <option value="Deep Object 4x4">Deep Object 4x4</option>
      <option value="Array replace 10k">Array replace 10k</option>
      <option value="Array concat 5k+5k">Array concat 5k+5k</option>
      <option value="Array deep 1k">Array deep 1k</option>
    </select>
  </div>
  <div id="log" class="log">待機中...</div>
  <table id="results" style="display:none">
    <thead>
      <tr>
        <th>ケース</th>
        <th>ライブラリ</th>
        <th>回数</th>
        <th>合計(ms)</th>
        <th>平均(ms)</th>
        <th>ops/sec</th>
        <th>相対速度</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module">
    import { gattaiMerge } from './merge-object-deep.js';
    import _ from 'lodash';
    import { deepmerge } from 'deepmerge-ts';

    const logEl = document.getElementById('log');
    const btnEl = document.getElementById('run');
    const filterEl = document.getElementById('caseFilter');
    const tableEl = document.getElementById('results');
    const tbodyEl = tableEl.querySelector('tbody');

    const libs = {
      your: {
        name: 'gattaiMerge',
        class: 'lib-your',
        merge: (target, sources, arrayStrategy) => {
          const opts = arrayStrategy ? { arrayStrategy } : {};
          return gattaiMerge(target, sources, opts);
        }
      },
      lodash: {
        name: 'lodash.mergeWith',
        class: 'lib-lodash',
        merge: (target, sources, arrayStrategy) => {
          if (arrayStrategy === 'replace' || arrayStrategy === 'concat') {
            return _.mergeWith({}, target, ...sources, (obj, src) => {
              if (Array.isArray(obj) && Array.isArray(src)) {
                return arrayStrategy === 'replace' ? src : obj.concat(src);
              }
            });
          }
          // deepはlodash標準だと無理なのでmergeで近似
          return _.merge({}, target, ...sources);
        }
      },
      deepmerge: {
        name: 'deepmerge-ts',
        class: 'lib-deepmerge',
        merge: (target, sources, arrayStrategy) => {
          const mergeArrays = arrayStrategy === 'replace'
            ? false
            : arrayStrategy === 'concat'
            ? true
            : undefined; // deepはデフォルト
          return deepmerge(target, ...sources, {
            mergeArrays
          });
        }
      }
    };

    function log(msg) {
      logEl.textContent = msg;
    }

    function genDeepObject(depth, breadth) {
      if (depth === 0) return { v: Math.random() };
      const obj = {};
      for (let i = 0; i < breadth; i++) {
        obj[`k${i}`] = genDeepObject(depth - 1, breadth);
      }
      return obj;
    }

    function genArray(len) {
      return Array.from({ length: len }, (_, i) => ({ id: i, v: Math.random() }));
    }

    const cases = [
      {
        name: 'Small PlainObject',
        setup: () => [
          { a: 1, b: { c: 2 } },
          [{ b: { d: 3 }, e: 4 }]
        ],
        iterations: 100000
      },
      {
        name: 'Deep Object 4x4',
        setup: () => {
          const base = genDeepObject(4, 4);
          const s1 = genDeepObject(4, 4);
          const s2 = genDeepObject(4, 4);
          return [base, [s1, s2]];
        },
        iterations: 2000
      },
      {
        name: 'Array replace 10k',
        setup: () => [
          { arr: genArray(10000) },
          [{ arr: genArray(10000) }]
        ],
        arrayStrategy: 'replace',
        iterations: 500
      },
      {
        name: 'Array concat 5k+5k',
        setup: () => [
          { arr: genArray(5000) },
          [{ arr: genArray(5000) }]
        ],
        arrayStrategy: 'concat',
        iterations: 500
      },
      {
        name: 'Array deep 1k',
        setup: () => [
          { arr: genArray(1000) },
          [{ arr: genArray(1000) }]
        ],
        arrayStrategy: 'deep',
        iterations: 200
      }
    ];

    async function runBench() {
      btnEl.disabled = true;
      tbodyEl.innerHTML = '';
      tableEl.style.display = 'table';

      const selected = filterEl.value;
      const targetCases = selected === 'all' ? cases : cases.filter(c => c.name === selected);

      for (const c of targetCases) {
        log(`準備中: ${c.name}...`);
        await new Promise(r => setTimeout(r, 10));

        const [target, sources] = c.setup();
        const results = [];

        for (const [key, lib] of Object.entries(libs)) {
          log(`実行中: ${c.name} - ${lib.name} x ${c.iterations}...`);
          await new Promise(r => setTimeout(r, 10));

          // warmup
          for (let i = 0; i < 5; i++) {
            lib.merge(structuredClone(target), structuredClone(sources), c.arrayStrategy);
          }

          const start = performance.now();
          for (let i = 0; i < c.iterations; i++) {
            lib.merge(structuredClone(target), structuredClone(sources), c.arrayStrategy);
          }
          const end = performance.now();

          const total = end - start;
          const avg = total / c.iterations;
          const ops = 1000 / avg;
          results.push({ key, lib, total, avg, ops });
        }

        // 相対速度計算。yourを基準=1.00x
        const baseOps = results.find(r => r.key === 'your').ops;
        results.forEach(r => {
          r.relative = r.ops / baseOps;
        });

        // 結果描画
        results.sort((a, b) => b.ops - a.ops);
        for (const r of results) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${c.name}</td>
            <td class="${r.lib.class}">${r.lib.name}</td>
            <td>${c.iterations.toLocaleString()}</td>
            <td>${r.total.toFixed(2)}</td>
            <td>${r.avg.toFixed(4)}</td>
            <td>${Math.round(r.ops).toLocaleString()}</td>
            <td>${r.relative.toFixed(2)}x</td>
          `;
          tbodyEl.appendChild(tr);
        }
      }

      log('完了');
      btnEl.disabled = false;
    }

    btnEl.addEventListener('click', runBench);
  </script>
</body>
</html>
